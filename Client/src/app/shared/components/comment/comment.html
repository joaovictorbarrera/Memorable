<div class="flex gap-3 items-center text-sm">
    <app-profile-icon class="mb-auto mt-1" [imageUrl]="comment.userProfileImageUrl" [username]="comment.username"></app-profile-icon>
    <div class="flex-col flex gap-1 min-w-0">
        <div class="flex items-center gap-2">
            <a [routerLink]="['/user', comment.username]" routerLinkActive="active">
                <span class="text-text-primary pb-1">{{ comment.displayName }}</span>
            </a>
            <p class="text-stone-400 text-sm">{{ timeAgo() }}</p>


        </div>
        @if (seeMore()) {
            <p class="text-text-offwhite wrap-break-word">{{ comment.textContent | slice:0:100 }}...
                <button (click)="openSeeMore()" class="text-text-secondary hover:underline">See more</button>
            </p>
        }
        @else {
            <p class="text-text-offwhite wrap-break-word">{{ comment.textContent }}</p>
        }
    </div>

    @if (this.globalService.user()?.userId === this.comment.userId) {
        <button (click)="deleteComment()" class="cursor-pointer hover:brightness-70 flex justify-center items-center ml-auto">
            <mat-icon fontIcon="delete" style="color: rgb(100, 0, 0); font-size: 1.2rem" ></mat-icon>
        </button>
    }
</div>
