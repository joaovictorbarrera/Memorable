@if (globalService.user()) {
    <app-header></app-header>
    <router-outlet />
}
@else {
    @if (!this.authService.loading())
    {
        <app-login></app-login>
    }
    @else
    {
        <div class="h-full w-full flex flex-col justify-center items-center">
            <p>Authenticating...</p>
            <app-spinning-wheel></app-spinning-wheel>
        </div>
    }
}
