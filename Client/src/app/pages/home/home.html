<main class="w-full flex justify-center">
    <div class="flex flex-col gap-2 max-w-xl w-full py-5 px-3">
        <div class="flex flex-col gap-8">
            <app-post-create></app-post-create>
            @for (post of this.postStore.all()(); track post.postId) {
                <app-post [postId]="post.postId"></app-post>
            }
        </div>

        @if (this.loading) {
            <p class="text-center text-gray-500 py-4">Loading more…</p>
        }

        @if (!this.loading && !this.hasMore) {
        <p class="text-center text-gray-500 py-4">Follow more users to see more posts.</p>
        }

        <div #scrollAnchor class="h-1 gap"></div>
    </div>
</main>
