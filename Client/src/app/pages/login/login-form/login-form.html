<header class="mt-4">
    <h1 class="text-2xl font-bold text-center">Login</h1>
    <p class="text-center text-gray-500 mt-2 mb-2">Please log in to continue.</p>
    @if (invalidLogin()) {
        <p class="text-center text-red-500 mt-2 mb-2">Username or Password is invalid.</p>
    }
    <p class="text-center text-gray-500">Don't have an account? <button (click)="this.needRegistering.emit()" class="text-accent-primary hover:underline">Sign up</button>.</p>
</header>
<form (submit)="login($event)">
    <div class="flex flex-col gap-4 mt-5">
        <input type="text" placeholder="Username"
        name="username"
        required
        class="px-3 border-2 border-bg-tertiary py-2 rounded-lg outline-none
        focus:border-none focus:ring-2 focus:ring-accent-primary/80">

        <input type="password" placeholder="Password"
        name="password"
        required
        class="px-3 border-2 border-bg-tertiary py-2 rounded-lg outline-none
        focus:border-none focus:ring-2 focus:ring-accent-primary/80">
        
        <app-submit-button [text]="'Log In'" [loading]="loading()"></app-submit-button>
    </div>
</form>
