<header class="mt-4">
    <h1 class="text-2xl font-bold text-center">Reset Password</h1>

    @if (this.error()) {
        <p class="text-center text-red-500 text-sm">{{ this.error() }}</p>
    }
</header>

<form class="flex flex-col gap-4 mt-5" (submit)="resetPassword($event)">
    <input required name="newPassword" type="password" placeholder="New Password" class="px-3 border-2 border-bg-tertiary py-2 rounded-lg outline-none
        focus:border-none focus:ring-2 focus:ring-accent-primary/80">
    <input required name="verifyPassword" type="password" placeholder="Confirm New Password" class="px-3 border-2 border-bg-tertiary py-2 rounded-lg outline-none
        focus:border-none focus:ring-2 focus:ring-accent-primary/80">

    <button type="submit"
    class="bg-accent-primary text-white py-2 rounded-lg hover:bg-accent-primary/90 transition disabled:bg-accent-primary/20 disabled:hover:bg-inherit disabled:pointer-events-none">Reset</button>
</form>
