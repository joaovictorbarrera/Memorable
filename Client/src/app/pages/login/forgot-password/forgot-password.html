<header>
    <h1 class="text-2xl font-bold text-center">Forgot Password</h1>
    <p class="text-center text-gray-500 mt-2 mb-2">Enter email to reset</p>
    @if (this.success()) {
        <p class="text-center text-green-500 my-2">Password Reset Link generated! <button class="text-text-offwhite hover:text-text-offwhite/80" (click)="this.doneResetting.emit()">Sign in</button></p>
    }
</header>

<form class="flex flex-col" (submit)="this.forgotPasswordSubmit($event)">
    <input type="text" placeholder="Email"
            name="email"
            class="px-3 border-2 border-bg-tertiary py-2 my-5 rounded-lg outline-none
            focus:border-none focus:ring-2 focus:ring-accent-primary/80">
    <button type="submit" class="bg-accent-primary text-white py-2 rounded-lg hover:bg-accent-primary/90 transition">Reset</button>
</form>

<button class="absolute top-4 left-4" (click)="this.doneResetting.emit()">
  <mat-icon fontIcon="arrow_back" style="color: #9D2D01"></mat-icon>
</button>
